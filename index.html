<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>👸 For Princess Raya ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@300;400;500;600;700;800&family=Caveat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; font-family: 'Poppins', sans-serif; background: #0a0a1a; -webkit-tap-highlight-color: transparent; }
        .slide { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: none; flex-direction: column; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.8s ease; z-index: 1; }
        .slide.active { display: flex; opacity: 1; z-index: 10; }
        .bg-stars { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
        .star { position: absolute; width: 3px; height: 3px; background: white; border-radius: 50%; animation: twinkle 2s ease-in-out infinite; }
        @keyframes twinkle { 0%, 100% { opacity: 0.3; transform: scale(0.8); } 50% { opacity: 1; transform: scale(1.2); } }
        .shooting-star { position: absolute; width: 100px; height: 2px; background: linear-gradient(90deg, transparent, white, transparent); animation: shoot 3s linear infinite; opacity: 0; }
        @keyframes shoot { 0% { transform: translateX(-100px) translateY(0); opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { transform: translateX(100vw) translateY(100px); opacity: 0; } }
        .floating-heart { position: absolute; font-size: 20px; animation: floatUp 6s ease-in infinite; opacity: 0; pointer-events: none; }
        @keyframes floatUp { 0% { transform: translateY(100vh) scale(0.5); opacity: 0; } 10% { opacity: 0.8; } 90% { opacity: 0.8; } 100% { transform: translateY(-10vh) scale(1.2); opacity: 0; } }
        .floating-flower { position: absolute; font-size: 18px; animation: floatFlower 8s ease-in-out infinite; opacity: 0.6; pointer-events: none; }
        @keyframes floatFlower { 0%, 100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-30px) rotate(15deg); } }
        .glow-orb { position: absolute; border-radius: 50%; filter: blur(60px); opacity: 0.3; animation: orbFloat 10s ease-in-out infinite; pointer-events: none; }
        @keyframes orbFloat { 0%, 100% { transform: translate(0, 0); } 33% { transform: translate(30px, -20px); } 66% { transform: translate(-20px, 30px); } }
        #slide1 { background: linear-gradient(180deg, #0a0a2e 0%, #1a0a2e 30%, #2d1b4e 60%, #3d1b6e 100%); }
        .moon-intro { position: absolute; top: 8%; right: 10%; width: 60px; height: 60px; background: radial-gradient(circle at 30% 30%, #fff8e7, #f0e68c); border-radius: 50%; box-shadow: 0 0 40px rgba(255, 248, 231, 0.4), 0 0 80px rgba(255, 248, 231, 0.2); animation: moonFloat 4s ease-in-out infinite; }
        @keyframes moonFloat { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .cute-emoji { font-size: 50px; margin-bottom: 15px; animation: emojiBounce 2s ease-in-out infinite; display: inline-block; }
        @keyframes emojiBounce { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.15); } }
        .measuring-title { font-family: 'Pacifico', cursive; font-size: 28px; color: #ffb3d9; text-shadow: 0 0 20px rgba(255, 179, 217, 0.5); margin-bottom: 10px; min-height: 40px; }
        .measuring-subtitle { font-size: 14px; color: #c8a2c8; margin-bottom: 30px; letter-spacing: 2px; }
        .progress-container { width: 280px; height: 12px; background: rgba(255,255,255,0.1); border-radius: 20px; overflow: hidden; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.1); }
        .progress-bar { height: 100%; width: 0%; background: linear-gradient(90deg, #ff6b9d, #ff8fab, #ff69b4, #ff1493); border-radius: 20px; transition: width 0.1s linear; box-shadow: 0 0 15px rgba(255, 20, 147, 0.5); position: relative; }
        .progress-bar::after { content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent); animation: barShine 1s ease-in-out infinite; }
        @keyframes barShine { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }
        .percentage { font-size: 48px; font-weight: 800; color: #ff69b4; text-shadow: 0 0 20px rgba(255, 105, 180, 0.5); margin-bottom: 15px; font-family: 'Poppins', sans-serif; }
        .status-text { font-size: 14px; color: #d8bfd8; min-height: 22px; letter-spacing: 1px; }
        .overload-text { font-size: 36px; font-weight: 800; color: #ff3366; text-shadow: 0 0 30px rgba(255, 51, 102, 0.8), 0 0 60px rgba(255, 51, 102, 0.4); animation: overloadPulse 0.4s ease-in-out infinite alternate; display: none; margin: 20px 0; }
        @keyframes overloadPulse { from { transform: scale(1); } to { transform: scale(1.1); } }
        .beyond-text { font-family: 'Pacifico', cursive; font-size: 32px; color: #ff69b4; text-shadow: 0 0 30px rgba(255, 105, 180, 0.8), 0 0 60px rgba(255, 105, 180, 0.4); display: none; animation: beyondGlow 1.5s ease-in-out infinite alternate; margin: 20px 0; }
        @keyframes beyondGlow { from { text-shadow: 0 0 20px rgba(255, 105, 180, 0.6); } to { text-shadow: 0 0 40px rgba(255, 105, 180, 1), 0 0 80px rgba(255, 105, 180, 0.5); } }
        .screen-shake { animation: shake 0.5s ease-in-out; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 20% { transform: translateX(-5px); } 40% { transform: translateX(5px); } 60% { transform: translateX(-5px); } 80% { transform: translateX(5px); } }
        #slide2 { background: linear-gradient(180deg, #0a0a2e 0%, #1a0a2e 30%, #2d1b4e 60%, #3d1b6e 100%); }
        .password-card { background: rgba(255,255,255,0.05); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; padding: 40px 30px; width: 90%; max-width: 340px; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.3), 0 0 40px rgba(255, 105, 180, 0.1); }
        .password-crown { font-size: 40px; margin-bottom: 10px; }
        .password-title { font-family: 'Pacifico', cursive; font-size: 24px; color: #ffb3d9; margin-bottom: 5px; text-shadow: 0 0 15px rgba(255, 179, 217, 0.3); }
        .password-subtitle { font-size: 13px; color: #c8a2c8; margin-bottom: 25px; }
        .online-indicator { display: flex; align-items: center; justify-content: center; gap: 6px; margin-bottom: 20px; font-size: 11px; color: #a0d8a0; }
        .online-dot { width: 8px; height: 8px; background: #4ade80; border-radius: 50%; animation: onlinePulse 2s ease-in-out infinite; box-shadow: 0 0 8px #4ade80; }
        @keyframes onlinePulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.6; transform: scale(0.8); } }
        .password-input { width: 100%; padding: 14px 20px; border: 2px solid rgba(255,255,255,0.15); border-radius: 16px; background: rgba(255,255,255,0.05); color: #ffb3d9; font-size: 16px; font-family: 'Poppins', sans-serif; text-align: center; outline: none; transition: all 0.3s ease; margin-bottom: 15px; }
        .password-input:focus { border-color: #ff69b4; box-shadow: 0 0 20px rgba(255, 105, 180, 0.3); }
        .password-input::placeholder { color: rgba(255,255,255,0.3); }
        .password-btn { width: 100%; padding: 14px; border: none; border-radius: 16px; background: linear-gradient(135deg, #ff6b9d, #ff1493); color: white; font-size: 16px; font-weight: 600; font-family: 'Poppins', sans-serif; cursor: pointer; transition: all 0.3s ease; box-shadow: 0 8px 25px rgba(255, 20, 147, 0.3); }
        .password-btn:hover { transform: translateY(-2px); box-shadow: 0 12px 35px rgba(255, 20, 147, 0.5); }
        .password-error { font-size: 13px; color: #ff6b6b; margin-top: 12px; min-height: 20px; display: none; }
        .password-success { font-size: 18px; color: #ffb3d9; margin-top: 15px; display: none; animation: fadeInUp 0.6s ease; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .photo-slide { background: linear-gradient(180deg, #0d0d3e 0%, #1a0a4e 20%, #2d1b6e 40%, #3d1b7e 50%, #2d1b6e 60%, #1a0a4e 80%, #0d0d3e 100%); }
        .photo-frame { position: relative; width: 78%; max-width: 290px; aspect-ratio: 3/4; border-radius: 24px; overflow: hidden; box-shadow: 0 0 30px rgba(255, 105, 180, 0.3), 0 0 60px rgba(199, 125, 255, 0.2), 0 0 90px rgba(255, 20, 147, 0.1), 0 20px 60px rgba(0,0,0,0.4); border: 3px solid rgba(255, 179, 217, 0.3); margin-bottom: 25px; transition: all 0.4s ease; }
        .photo-frame:hover { transform: scale(1.02); box-shadow: 0 0 50px rgba(255, 105, 180, 0.5), 0 0 100px rgba(199, 125, 255, 0.3), 0 0 150px rgba(255, 20, 147, 0.15), 0 20px 60px rgba(0,0,0,0.4); }
        .photo-frame img { width: 100%; height: 100%; object-fit: cover; animation: photoZoom 10s ease-in-out infinite; display: block; transition: transform 0.3s ease; }
        @keyframes photoZoom { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.08); } }
        .photo-glow { position: absolute; inset: -8px; border-radius: 28px; background: linear-gradient(45deg, #ff6b9d, #ff8fab, #c77dff, #ff6b9d, #ffb3d9, #ff1493, #e0aaff); background-size: 400% 400%; animation: glowShift 3s ease infinite; z-index: -1; opacity: 0.6; filter: blur(20px); }
        @keyframes glowShift { 0%, 100% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } }
        .photo-caption { font-family: 'Pacifico', cursive; font-size: 22px; color: #ffb3d9; text-align: center; text-shadow: 0 0 20px rgba(255, 179, 217, 0.6), 0 0 40px rgba(255, 105, 180, 0.3); margin-bottom: 8px; opacity: 0; animation: captionIn 0.8s ease 0.3s forwards; padding: 0 20px; }
        .photo-subcaption { font-size: 13px; color: #e8b4e8; text-align: center; letter-spacing: 1px; opacity: 0; animation: captionIn 0.8s ease 0.6s forwards; text-shadow: 0 0 10px rgba(232, 180, 232, 0.3); }
        @keyframes captionIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .nav-dots { display: flex; gap: 8px; margin-top: 20px; }
        .nav-dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,0.2); transition: all 0.3s ease; }
        .nav-dot.active { background: #ff69b4; box-shadow: 0 0 10px #ff69b4, 0 0 20px rgba(255, 105, 180, 0.5); width: 20px; border-radius: 10px; }
        .slide-nav { display: flex; gap: 15px; margin-top: 15px; }
        .slide-btn { padding: 10px 25px; border: 1px solid rgba(255,255,255,0.2); border-radius: 25px; background: rgba(255,255,255,0.05); color: #ffb3d9; font-size: 13px; font-family: 'Poppins', sans-serif; cursor: pointer; transition: all 0.3s ease; backdrop-filter: blur(10px); }
        .slide-btn:hover { background: rgba(255, 105, 180, 0.2); border-color: #ff69b4; transform: translateY(-2px); box-shadow: 0 0 20px rgba(255, 105, 180, 0.3); }
        #slide7 { background: linear-gradient(180deg, #1a0a1a 0%, #2d1b2d 30%, #1a0a3e 60%, #2d1b4e 100%); }
        .letter-paper { background: linear-gradient(135deg, #fff5f5 0%, #ffe6e6 100%); width: 90%; max-width: 360px; max-height: 75vh; border-radius: 16px; padding: 30px 25px; box-shadow: 0 20px 60px rgba(0,0,0,0.4), inset 0 0 60px rgba(255,200,200,0.1); position: relative; overflow-y: auto; -webkit-overflow-scrolling: touch; }
        .letter-paper::before { content: ''; position: absolute; top: 0; left: 30px; width: 2px; height: 100%; background: linear-gradient(to bottom, transparent, rgba(255,150,150,0.2), transparent); }
        .letter-header { font-family: 'Pacifico', cursive; font-size: 22px; color: #c2185b; margin-bottom: 15px; text-align: center; }
        .letter-body { font-family: 'Caveat', cursive; font-size: 18px; color: #5d4037; line-height: 1.8; text-align: justify; }
        .typing-indicator { display: flex; align-items: center; gap: 4px; margin-bottom: 10px; }
        .typing-dot { width: 6px; height: 6px; background: #c2185b; border-radius: 50%; animation: typingBounce 1s ease-in-out infinite; }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typingBounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
        .letter-signature { font-family: 'Pacifico', cursive; font-size: 16px; color: #c2185b; text-align: right; margin-top: 20px; opacity: 0; }
        .letter-signature.show { animation: fadeInUp 1s ease forwards; }

        /* === RECONSTRUCTED CSS (was in missing Chunk 3) === */
        .ending-moon { width: 80px; height: 80px; background: radial-gradient(circle at 30% 30%, #fff8e7, #f0e68c); border-radius: 50%; box-shadow: 0 0 40px rgba(255, 248, 231, 0.4), 0 0 80px rgba(255, 248, 231, 0.2); animation: moonFloat 4s ease-in-out infinite; cursor: pointer; margin-bottom: 20px; }
        .tap-moon { font-size: 12px; color: rgba(255,255,255,0.4); margin-bottom: 30px; letter-spacing: 2px; }
        .ending-text { font-family: 'Pacifico', cursive; font-size: 28px; color: #ffb3d9; text-shadow: 0 0 20px rgba(255, 179, 217, 0.5); margin-bottom: 10px; opacity: 0; }
        .ending-text.show { animation: fadeInUp 1s ease forwards; }
        .ending-sub { font-size: 16px; color: #c8a2c8; margin-bottom: 20px; opacity: 0; }
        .ending-sub.show { animation: fadeInUp 1s ease 0.5s forwards; }
        .ending-emoji { font-size: 40px; opacity: 0; }
        .ending-emoji.show { animation: fadeInUp 1s ease 1s forwards; }
        .sorry-big { font-family: 'Pacifico', cursive; font-size: 48px; color: #ff6b6b; text-shadow: 0 0 30px rgba(255, 107, 107, 0.5); margin-bottom: 10px; animation: sorryPulse 2s ease-in-out infinite; }
        @keyframes sorryPulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        .sorry-sub { font-size: 14px; color: #c8a2c8; margin-bottom: 30px; }
        .bloom-container { position: absolute; inset: 0; pointer-events: none; }
        .bloom-flower { position: absolute; font-size: 30px; animation: bloomIn 1s ease forwards; opacity: 0; transform: translate(-50%, -50%) scale(0); }
        @keyframes bloomIn { 0% { opacity: 0; transform: translate(-50%, -50%) scale(0); } 100% { opacity: 1; transform: translate(-50%, -50%) scale(1); } }
        .black-heart-float { position: absolute; font-size: 20px; animation: floatUpBlack 4s ease-in infinite; opacity: 0; pointer-events: none; }
        @keyframes floatUpBlack { 0% { transform: translateY(0) scale(0.5); opacity: 0; } 10% { opacity: 0.8; } 90% { opacity: 0.8; } 100% { transform: translateY(-100vh) scale(1.2); opacity: 0; } }
        .petal-fall { position: absolute; font-size: 16px; animation: petalFall 5s ease-in infinite; opacity: 0; pointer-events: none; }
        @keyframes petalFall { 0% { transform: translateY(-10vh) rotate(0deg); opacity: 0; } 10% { opacity: 1; } 90% { opacity: 0.8; } 100% { transform: translateY(100vh) rotate(360deg); opacity: 0; } }
        .secret-popup { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.8); background: rgba(255,255,255,0.1); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.2); border-radius: 24px; padding: 30px; max-width: 300px; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.5); opacity: 0; pointer-events: none; transition: all 0.4s ease; z-index: 100; }
        .secret-popup.show { opacity: 1; transform: translate(-50%, -50%) scale(1); pointer-events: all; }
        .secret-popup p { color: #ffb3d9; font-size: 14px; line-height: 1.6; margin-bottom: 20px; }
        .close-secret { padding: 10px 25px; border: 1px solid rgba(255,255,255,0.2); border-radius: 20px; background: rgba(255,105,180,0.2); color: #ffb3d9; font-family: 'Poppins', sans-serif; cursor: pointer; transition: all 0.3s ease; }
        .close-secret:hover { background: rgba(255,105,180,0.4); }
        .credits { position: absolute; bottom: 20px; display: flex; flex-direction: column; gap: 4px; text-align: center; font-size: 11px; color: rgba(255,255,255,0.3); }
        .made-with { position: fixed; bottom: 20px; right: 20px; font-size: 12px; color: rgba(255,255,255,0.3); opacity: 0; transition: opacity 1s ease; }
        .made-with.show { opacity: 1; }
        audio { display: none; }
    </style>
</head>
<body>
    <div class="bg-stars" id="bgStars"></div>
    
    <!-- Slide 1: Cuteness Meter -->
    <div class="slide active" id="slide1">
        <div class="moon-intro"></div>
        <div class="cute-emoji">🥰</div>
        <div class="measuring-title" id="measuringTitle"></div>
        <div class="measuring-subtitle" id="measuringSub" style="display:none;">Hold on... this might take a while 😅</div>
        <div class="progress-container" id="progressContainer" style="display:none;">
            <div class="progress-bar" id="progressBar"></div>
        </div>
        <div class="percentage" id="percentage" style="display:none;">0%</div>
        <div class="status-text" id="statusText"></div>
        <div class="overload-text" id="overloadText">SYSTEM OVERLOAD! 💥</div>
        <div class="beyond-text" id="beyondText">Beyond Measurable 💖</div>
    </div>
    
    <!-- Slide 2: Password -->
    <div class="slide" id="slide2">
        <div class="password-card">
            <div class="password-crown">👑</div>
            <div class="password-title">Princess Raya</div>
            <div class="password-subtitle">Enter your name to unlock</div>
            <div class="online-indicator">
                <div class="online-dot"></div>
                <span>Online now</span>
            </div>
            <input type="text" class="password-input" id="passwordInput" placeholder="Your name...">
            <button class="password-btn" id="passwordBtn" onclick="checkPassword()">Unlock ✨</button>
            <div class="password-error" id="passwordError">Wrong name! Try again 💔</div>
            <div class="password-success" id="passwordSuccess">Welcome, Princess! 👸</div>
        </div>
    </div>
    
    <!-- Background Music -->
    <audio id="bg-music" loop>
        <source src="music.mp3" type="audio/mpeg">
    </audio>
    
    <!-- Slide 3: Photo 1 -->
    <div class="slide photo-slide" id="slide3">
        <div class="photo-frame">
            <div class="photo-glow"></div>
            <img src="photo1.jpg" alt="Memory 1">
        </div>
        <div class="photo-caption">Beautiful Moments ✨</div>
        <div class="photo-subcaption">Every memory with you is precious</div>
        <div class="nav-dots">
            <div class="nav-dot active"></div>
            <div class="nav-dot"></div>
            <div class="nav-dot"></div>
            <div class="nav-dot"></div>
        </div>
        <div class="slide-nav">
            <button class="slide-btn" onclick="goToSlide(2)">← Back</button>
            <button class="slide-btn" onclick="goToSlide(4)">Next →</button>
        </div>
    </div>
    
    <!-- Slide 4: Photo 2 -->
    <div class="slide photo-slide" id="slide4">
        <div class="photo-frame">
            <div class="photo-glow"></div>
            <img src="photo2.jpg" alt="Memory 2">
        </div>
        <div class="photo-caption">Your Smile 🌸</div>
        <div class="photo-subcaption">Lights up my entire world</div>
        <div class="nav-dots">
            <div class="nav-dot"></div>
            <div class="nav-dot active"></div>
            <div class="nav-dot"></div>
            <div class="nav-dot"></div>
        </div>
        <div class="slide-nav">
            <button class="slide-btn" onclick="goToSlide(3)">← Back</button>
            <button class="slide-btn" onclick="goToSlide(5)">Next →</button>
